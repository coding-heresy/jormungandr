
syntax = "proto2";

package jmg.test;

import "google/protobuf/timestamp.proto";

enum Active {
  UNKNOWN = 0;
  ACTIVATED = 1;
  DEACTIVATED = 2;
};

message InnerMsg {
  required int32 inner_int_32 = 1;
  optional string opt_inner_str = 2;
}

message TestMsg {
  required bool boolean = 1;

  required int32 int_32 = 2;
  required uint32 uint_32 = 3;
  required sfixed32 sfixed_32 = 4;
  required fixed32 fixed_32 = 5;

  required int64 int_64 = 6;
  required uint64 uint_64 = 7;
  required sfixed64 sfixed_64 = 8;
  required fixed64 fixed_64 = 9;

  required float flt = 10;
  required double dbl = 11;

  required string str = 12;
  required bytes bytes_str = 13;

  required google.protobuf.Timestamp ts = 14;

  repeated int32 ints = 15;

  repeated string strs = 16;

  required InnerMsg inner_msg = 17;

  required Active active_state = 18;

  required uint32 id_32_safe = 19;
}

message TestOptMsg {
  optional bool opt_bool = 1;

  optional int32 opt_int_32 = 2;
  optional uint32 opt_uint_32 = 3;
  optional sfixed32 opt_sfixed_32 = 4;
  optional fixed32 opt_fixed_32 = 5;

  optional int64 opt_int_64 = 6;
  optional uint64 opt_uint_64 = 7;
  optional sfixed64 opt_sfixed_64 = 8;
  optional fixed64 opt_fixed_64 = 9;

  optional float opt_flt = 10;
  optional double opt_dbl = 11;

  optional string opt_str = 12;
  optional bytes opt_bytes_str = 13;

  optional google.protobuf.Timestamp opt_ts = 14;

  optional InnerMsg opt_inner_msg = 15;

  optional Active opt_active_state = 16;

  optional uint32 opt_id_32_safe = 17;
}
