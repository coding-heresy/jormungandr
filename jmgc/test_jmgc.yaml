
# JMG IDL spec for testing all encodings

package:
  name: "test_jmgc"
  protobuf_package: "jmgc.test"
  protobuf_imports:
    - file: "google/protobuf/timestamp.proto"
types:
  - Active:
      type: "enum"
      underlying_type: u8
      values:
        - name: "unknown"
          value: 0
        - name: "activated"
          value: 1
        - name: "deactivated"
          value: 2
  - StrId:
      type: "str"
      concept: key
  - IntId:
      type: u32
      concept: key
  - ImportantValue:
      type: u64
      concept: arithmetic
# TODO(bd) support groups?
#groups:
objects:
  - InnerMsg:
      - inner_int_32:
          type: "i32"
          protobuf_id: 1
          cbe_id: 1
      - opt_inner_str:
          type: "str"
          required: false
          protobuf_id: 2
          cbe_id: 2
  - TestMsg:
